name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validations:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-west-2
    services:
      postgres:
        image: postgres:latest@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: camera_reel
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v2
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Start moto (AWS mock)
        run: |
          docker run -d --name moto -p 4566:5000 motoserver/moto:5.2.2@sha256:d8ae5edc2bf080e7e4c13f9bd4b29b53ac3b4427e92956318db3dbe23ec43eb7
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/moto-api/ >/dev/null && { echo "moto is ready"; break; }
            sleep 1
          done

      - name: Setup AWS resources in moto
        run: |
          # Create SNS topic
          aws --endpoint-url=http://localhost:4566 sns create-topic --name events --region us-west-2
          # Create S3 bucket
          aws --endpoint-url=http://localhost:4566 s3 mb s3://camera-reel
          aws --endpoint-url=http://localhost:4566 s3api put-bucket-acl --bucket camera-reel --acl public-read

      - name: Run tests
        run: cargo test
